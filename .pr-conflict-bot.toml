# pr-conflict-bot config for this repo (dogfood — bot operates on its own PRs).
# Required by strict mode (REQUIRE_REPO_CONFIG=true on the live deployment).

[verify]
# Bot clones repo fresh — no deps installed. Each verify cmd installs first.
# After first install the others are no-ops (already satisfied).
lint = "python3 -m pip install -q -e '.[dev]' && ruff check ."
typecheck = "python3 -m pip install -q -e '.[dev]' && mypy src"
test = "python3 -m pip install -q -e '.[dev]' && pytest -q"
timeout_seconds = 1200

[behavior]
enabled = true

# Lock files + auto-generated dirs the LLM should never touch.
skip_paths = [
    "uv.lock",
    "package-lock.json",
    "yarn.lock",
    "poetry.lock",
    "**/migrations/*",
    "CHANGELOG.md",
    ".venv/**",
    ".pytest_cache/**",
    ".ruff_cache/**",
    ".mypy_cache/**",
]

max_files_per_pr = 50
