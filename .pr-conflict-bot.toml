# pr-conflict-bot config for this repo (dogfood — bot operates on its own PRs).
# Required by strict mode (REQUIRE_REPO_CONFIG=true on the live deployment).

[verify]
# Bot clones repo fresh + Ubuntu 24.04 blocks system pip (PEP 668).
# Use a per-clone venv. lint creates it; typecheck/test reuse it (cwd persists).
lint = "([ -d .vbot ] || python3 -m venv .vbot) && .vbot/bin/pip install -q -e '.[dev]' && .vbot/bin/ruff check ."
typecheck = ".vbot/bin/mypy src"
test = ".vbot/bin/pytest -q"
timeout_seconds = 1200

[qa]
# TEMPORARY (test/qa-inplace-fix-e2e only): opt this repo into fix-mode QA to
# exercise the in-place fix push end-to-end. Do NOT merge this block to main.
enabled = true
mode = "fix"

[behavior]
enabled = true

# Lock files + auto-generated dirs the LLM should never touch.
skip_paths = [
    "uv.lock",
    "package-lock.json",
    "yarn.lock",
    "poetry.lock",
    "**/migrations/*",
    "CHANGELOG.md",
    ".venv/**",
    ".pytest_cache/**",
    ".ruff_cache/**",
    ".mypy_cache/**",
]

max_files_per_pr = 50
